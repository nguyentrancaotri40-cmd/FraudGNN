# ============================================================
# CONFIG: CreditCard2023 - TEST NHANH (GIỐNG PAPER)
# ============================================================
# ✅ Giống paper 100% về:
#   - Temporal split (70-15-15)
#   - batch_size (64 / 256)
#   - epochs (100)
#   - max_neighbors_per_node (3)
#   - hidden_dim (64), num_layers (3)
#   - similarity_threshold (0.98)
#
# ⚠️ Chỉ khác paper:
#   - sample_frac: 0.1 (chỉ 10% data để chạy nhanh)
#   - federated.rounds: 5 (giảm để test)
#   - federated.local_epochs: 2 (giảm để test)
#   - patience: 5 (giảm để test)
# ============================================================

flags:
  hard_edges: true
  soft_edges: false
  hybrid_graph: false
  weighted_fusion: false
  federated: true          # ✅ GIỐNG PAPER
  dqn: true
  pruning: false

experiment:
  name: creditcard_sample_10pct
  pipeline: fraudgnn_rl
  dataset: creditcard

dataset:
  name: CreditCard2023
  path: data/raw/creditcard_2023_fast.csv
  label_col: Class
  time_col: id
  time_unit: index
  sample_frac: 0.1         # ✅ 10% DATA - CHỈ ĐỂ TEST
  random_state: 42

split:
  strategy: temporal       # ✅ GIỐNG PAPER
  train_ratio: 0.70
  val_ratio: 0.15

preprocess:
  drop_cols:
    - id
  categorical_cols: []
  numeric_strategy: median

graph:
  type: transaction_similarity
  time_window_hours: 1000.0
  similarity_threshold: 0.98       # ✅ GIỐNG PAPER
  max_neighbors_per_node: 3        # ✅ GIỐNG PAPER
  add_self_loops: true

model:
  hidden_dim: 64                   # ✅ GIỐNG PAPER
  num_layers: 3                    # ✅ GIỐNG PAPER
  dropout: 0.20
  num_node_types: 1

train:
  epochs: 100                      # ✅ GIỐNG PAPER
  patience: 5                      # ⚠️ Giảm để test
  batch_size: 64                   # ✅ GIỐNG PAPER
  learning_rate: 0.001
  weight_decay: 0.0001

rl:
  enabled: true
  threshold_bins: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50]
  fpr_penalty: 0.5
  epochs: 100                      # ✅ GIỐNG PAPER
  batch_size: 256                  # ✅ GIỐNG PAPER

federated:
  num_clients: 3
  rounds: 5                        # ⚠️ Giảm để test
  local_epochs: 2                  # ⚠️ Giảm để test
  learning_rate: 0.001
  batch_size: 64                   # ✅ GIỐNG PAPER
  aggregation: fedavg

threshold_selection:
  metric: custom
  f1_weight: 1.0
  recall_weight: 0.8
  precision_weight: 0.1
  fpr_weight: 0.5
  max_fpr: 0.20
  min_recall: 0.30