flags:
  hard_edges: true
  soft_edges: false
  hybrid_graph: false
  weighted_fusion: false
  federated: false
  dqn: true
  pruning: false

experiment:
  name: test
  pipeline: fraudgnn_rl
  dataset: paysim

dataset:
  name: PaySim
  path: data/raw/paysim_fast.csv
  label_col: isFraud
  time_col: step
  time_unit: hour
  sample_frac: 0.01
  random_state: 42

split:
  strategy: temporal
  train_ratio: 0.70
  val_ratio: 0.15

preprocess:
  drop_cols:
    - nameOrig
    - nameDest
    - isFlaggedFraud
  categorical_cols:
    - type
  numeric_strategy: median

graph:
  type: transaction_similarity
  time_window_hours: 1.0
  similarity_threshold: 0.99
  max_neighbors_per_node: 2
  add_self_loops: true

model:
  hidden_dim: 64
  num_layers: 3
  dropout: 0.20
  num_node_types: 1

train:
  epochs: 1
  patience: 1
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001

rl:
  enabled: true
  threshold_bins: [0.3, 0.5, 0.7]
  fpr_penalty: 0.5
  epochs: 1
  batch_size: 256